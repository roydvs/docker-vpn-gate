name: Update VPN Servers

on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch VPN Gate List
        run: |
          curl -s "https://www.vpngate.net/api/iphone/" > servers.csv

      - name: Commit and Push
        run: |
          git config --local user.email "actions@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add servers.csv

          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update servers.csv $TIMESTAMP[skip ci]" && git push)
